##############################################################
#  Nginx Virtual Host – MyFirstProject
#  Place this file at: /etc/nginx/sites-available/myapp.conf
#  Then: sudo ln -s /etc/nginx/sites-available/myapp.conf /etc/nginx/sites-enabled/
##############################################################

# ── Rate-limiting zone (apply to API) ──────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;          # ← replace with your domain or VPS IP

    # Redirect all HTTP → HTTPS once you have SSL set up
    # Uncomment when ready:
    # return 301 https://$host$request_uri;

    ####################################################################
    # 1. Static Frontend (Expo Web build output)
    #    Expo exports to:  dist/   (when output = "static" in app.json)
    ####################################################################
    root /var/www/myapp/frontend/dist;
    index index.html;

    # SPA fallback – all unknown paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    ####################################################################
    # 2. Laravel Backend API  →  127.0.0.1:8000
    ####################################################################
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Increase timeout for face-recognition calls (can be slow)
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    ####################################################################
    # 3. Python Face Service  →  127.0.0.1:5050
    #    Accessed ONLY from Laravel (127.0.0.1), NOT exposed publicly.
    #    Remove or comment out this block if you prefer Laravel-only access.
    ####################################################################
    # location /face-api/ {
    #     proxy_pass http://127.0.0.1:5050/;
    # }

    ####################################################################
    # Security headers
    ####################################################################
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    ####################################################################
    # Static asset caching
    ####################################################################
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    ####################################################################
    # Block access to hidden files (e.g. .env)
    ####################################################################
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

